<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word DNA Lab — WRS 2.4 & 2.5</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a1f3a;--navy2:#232845;--navy3:#2d3360;
  --violet:#6c63ff;--violet-lt:#8b85ff;--violet-dk:#4d45cc;
  --gold:#f5c842;--gold-dk:#c9a020;
  --mint:#4ecfb3;--mint-dk:#32a88f;--mint-lt:#d0f5ef;
  --coral:#ff6b6b;--coral-dk:#cc4444;--coral-lt:#ffe0e0;
  --card:#ffffff;--card2:#f7f8ff;
  --text:#1a1f3a;--sub:#6b7280;--border:#e5e7f0;
  --r:14px;--rs:10px;
}
body{font-family:'Nunito',system-ui,sans-serif;background:var(--navy);color:var(--card);min-height:100vh;padding:0}
.wrap{max-width:540px;margin:0 auto;padding:16px 16px 40px}

/* screens */
.screen{display:none}.screen.active{display:block}

/* typography */
h1{font-size:26px;font-weight:900;margin-bottom:4px;color:#fff}
h2{font-size:20px;font-weight:800;margin-bottom:10px;color:#fff}
h3{font-size:16px;font-weight:700;margin-bottom:6px;color:#fff}
.sub{font-size:13px;color:rgba(255,255,255,.55);margin-bottom:16px}
.sec{font-size:10px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:8px}

/* cards */
.card{background:var(--card);border-radius:var(--r);padding:18px;margin-bottom:14px;color:var(--text)}
.card-navy{background:var(--navy2);border-radius:var(--r);padding:18px;margin-bottom:14px;border:1px solid rgba(255,255,255,.08)}
.card h3{color:var(--text)}
.card .sec{color:var(--sub)}
.card .sub{color:var(--sub)}

/* buttons */
.btn{font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;border:none;border-radius:var(--rs);padding:10px 18px;font-size:14px;transition:transform .15s,box-shadow .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:scale(.97)}
.btn-violet{background:var(--violet);color:#fff;box-shadow:0 4px 14px rgba(108,99,255,.4)}
.btn-violet:hover{background:var(--violet-lt);box-shadow:0 6px 20px rgba(108,99,255,.5)}
.btn-mint{background:var(--mint);color:#fff;box-shadow:0 4px 14px rgba(78,207,179,.35)}
.btn-mint:hover{background:var(--mint-dk)}
.btn-coral{background:var(--coral);color:#fff;box-shadow:0 4px 14px rgba(255,107,107,.35)}
.btn-coral:hover{background:var(--coral-dk)}
.btn-ghost{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.15)}
.btn-ghost:hover{background:rgba(255,255,255,.15)}
.btn-full{width:100%;justify-content:flex-start;padding:14px 18px;font-size:15px;margin-bottom:8px;border-radius:var(--r)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}

/* stat cards */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:14px}
.stat{background:var(--navy2);border-radius:var(--r);padding:14px;text-align:center;border:1px solid rgba(255,255,255,.07)}
.stat-n{font-size:28px;font-weight:900;color:var(--gold)}
.stat-l{font-size:11px;font-weight:700;color:rgba(255,255,255,.45);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

/* XP / progress */
.xp-bar-bg{background:rgba(255,255,255,.1);border-radius:20px;height:6px;margin:6px 0}
.xp-bar-fill{height:6px;border-radius:20px;background:linear-gradient(90deg,var(--violet),var(--mint));transition:width .5s ease}
.prog-bg{background:rgba(255,255,255,.1);border-radius:20px;height:7px}
.prog-fill{height:7px;border-radius:20px;background:var(--violet);transition:width .4s}

/* substep selector */
.ss-btn{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;border:2px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.5);font-family:'Nunito',sans-serif;transition:all .2s}
.ss-btn.active{background:var(--violet);border-color:var(--violet);color:#fff;box-shadow:0 4px 14px rgba(108,99,255,.4)}

/* BIG base display — tile flip */
.base-wrap{perspective:800px;margin:16px 0;cursor:default}
.base-tile{background:linear-gradient(135deg,var(--violet),var(--navy3));border-radius:18px;padding:24px 20px;text-align:center;box-shadow:0 8px 32px rgba(108,99,255,.3);transform-style:preserve-3d;animation:tileIn .4s ease}
@keyframes tileIn{from{transform:rotateY(-90deg) scale(.8);opacity:0}to{transform:rotateY(0) scale(1);opacity:1}}
.base-text{font-size:38px;font-weight:900;color:#fff;letter-spacing:2px;text-shadow:0 2px 12px rgba(0,0,0,.3)}
.base-sub{font-size:12px;font-weight:700;color:rgba(255,255,255,.5);margin-top:6px;letter-spacing:1px;text-transform:uppercase}

/* choice buttons */
.choice-btn{width:100%;text-align:left;padding:14px 18px;font-size:15px;font-weight:700;margin-bottom:8px;border-radius:var(--r);background:var(--navy2);border:2px solid rgba(255,255,255,.1);cursor:pointer;font-family:'Nunito',sans-serif;color:#fff;transition:all .15s}
.choice-btn:hover:not(:disabled){background:var(--navy3);border-color:var(--violet);transform:translateX(4px)}
.choice-btn:disabled{cursor:default}
.choice-btn.correct{background:rgba(78,207,179,.15);border-color:var(--mint);color:var(--mint)}
.choice-btn.wrong{background:rgba(255,107,107,.15);border-color:var(--coral);color:var(--coral)}

/* feedback */
.fb{text-align:center;padding:14px 18px;border-radius:var(--rs);margin:10px 0;font-weight:800;font-size:15px;animation:popIn .3s ease}
@keyframes popIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.fb.ok{background:rgba(78,207,179,.2);color:var(--mint);border:1px solid rgba(78,207,179,.3)}
.fb.no{background:rgba(255,107,107,.2);color:var(--coral);border:1px solid rgba(255,107,107,.3)}

/* example box */
.ex-box{background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.25);border-radius:var(--rs);padding:12px 16px;margin-top:10px}
.ex-box .sec{color:var(--gold);margin-bottom:4px}
.ex-box p{font-size:13px;color:rgba(255,255,255,.8);font-weight:600}

/* streak badge */
.streak{display:inline-flex;align-items:center;gap:4px;background:rgba(245,200,66,.15);border:1px solid rgba(245,200,66,.3);border-radius:20px;padding:4px 12px;font-size:13px;font-weight:800;color:var(--gold)}

/* VS bar */
.vs-card{background:var(--navy2);border-radius:var(--r);padding:14px 16px;margin-bottom:12px;border:1px solid rgba(255,255,255,.08)}
.hp-bg{background:rgba(255,255,255,.1);border-radius:20px;height:8px;flex:1}
.hp-f{height:8px;border-radius:20px;transition:width .4s}
.av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;flex-shrink:0}

/* mastery pill */
.pill-master{background:linear-gradient(90deg,var(--gold),#f0a020);color:#3a2800;font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px}
.pill-try{font-size:11px;font-weight:700;color:rgba(255,255,255,.35)}

/* passage */
.passage-box{background:var(--card);border-radius:var(--r);padding:20px;color:var(--text);font-size:16px;line-height:1.75;max-height:420px;overflow-y:auto}
.passage-title{font-size:20px;font-weight:900;text-align:center;margin-bottom:4px;color:var(--navy)}
.pass-sub{font-size:11px;font-weight:700;text-align:center;color:var(--sub);letter-spacing:.5px;text-transform:uppercase;margin-bottom:16px}
.comp-card{background:var(--navy2);border-radius:var(--r);padding:16px;margin-bottom:12px;border:1px solid rgba(255,255,255,.08)}
.comp-q{font-size:15px;font-weight:700;margin-bottom:12px;color:#fff}
.comp-opt{display:flex;align-items:center;gap:10px;margin-bottom:10px;cursor:pointer;padding:10px 14px;border-radius:var(--rs);border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);transition:all .15s;font-size:14px;font-weight:600;color:rgba(255,255,255,.85)}
.comp-opt:hover{border-color:var(--violet);background:rgba(108,99,255,.1)}
.comp-opt.selected{border-color:var(--violet);background:rgba(108,99,255,.15);color:#fff}
.comp-opt.reveal-ok{border-color:var(--mint);background:rgba(78,207,179,.15);color:var(--mint)}
.comp-opt.reveal-no{border-color:var(--coral);background:rgba(255,107,107,.1);color:var(--coral);opacity:.7}

/* sentence */
.sent-card{background:linear-gradient(135deg,var(--navy2),var(--navy3));border-radius:var(--r);padding:28px 20px;text-align:center;font-size:20px;font-weight:700;line-height:1.5;color:#fff;margin:14px 0;border:1px solid rgba(255,255,255,.1);box-shadow:0 8px 24px rgba(0,0,0,.2)}
.sent-input{background:var(--navy2);border:2px solid rgba(255,255,255,.15);border-radius:var(--rs);padding:12px 16px;font-size:16px;font-family:'Nunito',sans-serif;font-weight:600;color:#fff;width:100%;margin-bottom:10px}
.sent-input:focus{outline:none;border-color:var(--violet)}
.sent-input::placeholder{color:rgba(255,255,255,.3)}

/* nav top */
.top-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.top-bar h2{margin:0;flex:1}
.back-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:var(--rs);padding:8px 14px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;font-family:'Nunito',sans-serif}
.back-btn:hover{background:rgba(255,255,255,.15)}

/* score line */
.score-line{display:flex;justify-content:space-between;align-items:center;margin-top:12px;min-height:32px}
.score-badge{font-size:15px;font-weight:800;color:rgba(255,255,255,.7)}

/* select / input (light) */
.sel-light{background:var(--card2);border:1.5px solid var(--border);border-radius:var(--rs);padding:10px 12px;font-size:15px;font-family:'Nunito',sans-serif;font-weight:600;color:var(--text);width:100%;margin-bottom:12px}
.sel-light:focus{outline:2px solid var(--violet);outline-offset:1px}
label.lbl{font-size:12px;font-weight:700;color:var(--sub);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}

/* confetti canvas */
#confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}

/* results */
.result-emoji{font-size:60px;text-align:center;margin:10px 0;animation:bounce .6s ease}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}

/* progress list */
.prog-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.prog-row:last-child{border-bottom:none}

hr{border:none;border-top:1px solid rgba(255,255,255,.08);margin:14px 0}

@media(max-width:400px){.base-text{font-size:28px}.sent-card{font-size:17px}}
</style>
</head>
<body>
<canvas id="confetti"></canvas>
<div class="wrap">

<!-- HOME -->
<div id="s-home" class="screen active">
  <div style="text-align:center;padding:20px 0 12px">
    <div style="font-size:48px;margin-bottom:8px">🔬</div>
    <h1>Word DNA Lab</h1>
    <p class="sub">Wilson Reading · Substeps 2.4 &amp; 2.5 · Latin Bases</p>
  </div>
  <div class="g2">
    <div class="stat"><div class="stat-n" id="h-mastered">0</div><div class="stat-l">Mastered</div></div>
    <div class="stat"><div class="stat-n" id="h-streak">0</div><div class="stat-l">Best Streak</div></div>
  </div>
  <div class="card-navy">
    <div class="sec">Substep</div>
    <div class="btn-row" style="margin:8px 0 12px">
      <button class="ss-btn active" id="ss-24" onclick="setSS('2.4')">2.4</button>
      <button class="ss-btn" id="ss-25" onclick="setSS('2.5')">2.5</button>
      <button class="ss-btn" id="ss-both" onclick="setSS('both')">Both</button>
    </div>
    <div id="ss-desc" style="font-size:12px;color:rgba(255,255,255,.4);line-height:1.6"></div>
  </div>
  <div class="sec" style="margin-top:4px">Latin Base Games</div>
  <button class="btn btn-violet btn-full" onclick="goMode('practice')">📖 Solo practice</button>
  <button class="btn btn-ghost btn-full" onclick="goMode('human')">👥 Human vs human</button>
  <button class="btn btn-ghost btn-full" onclick="goMode('computer')">🤖 vs Computer</button>
  <div class="sec" style="margin-top:8px">Reading Practice</div>
  <button class="btn btn-mint btn-full" onclick="goMode('sentences')">📝 Sentence reading</button>
  <button class="btn btn-ghost btn-full" onclick="goMode('passage')">📖 Passage &amp; comprehension</button>
  <button class="btn btn-ghost btn-full" style="margin-top:4px" onclick="show('s-prog')">📊 Progress tracker</button>
</div>

<!-- PROGRESS -->
<div id="s-prog" class="screen">
  <div class="top-bar"><button class="back-btn" onclick="show('s-home')">← Back</button><h2>Progress</h2></div>
  <div class="g4">
    <div class="stat"><div class="stat-n" id="pt">0</div><div class="stat-l">Answered</div></div>
    <div class="stat"><div class="stat-n" id="pc">0</div><div class="stat-l">Correct</div></div>
    <div class="stat"><div class="stat-n" id="pp">—</div><div class="stat-l">Accuracy</div></div>
    <div class="stat"><div class="stat-n" id="ps">0</div><div class="stat-l">Streak</div></div>
  </div>
  <div class="card-navy" style="max-height:400px;overflow-y:auto" id="prog-list"></div>
  <hr>
  <button class="btn btn-coral" style="width:100%;justify-content:center" onclick="doReset()">Reset all progress</button>
</div>

<!-- HUMAN SETUP -->
<div id="s-human" class="screen">
  <div class="top-bar"><button class="back-btn" onclick="show('s-home')">← Back</button><h2>Human vs human</h2></div>
  <div class="card">
    <label class="lbl">Player 1 name</label><input class="sel-light" type="text" id="p1n" value="Player 1">
    <label class="lbl">Player 2 name</label><input class="sel-light" type="text" id="p2n" value="Player 2">
    <label class="lbl">Rounds</label>
    <select class="sel-light" id="h-rounds"><option value="5">5</option><option value="10" selected>10</option><option value="15">15</option><option value="20">20</option></select>
    <label class="lbl">Question type</label>
    <select class="sel-light" id="h-qtype"><option value="meaning">Base → meaning</option><option value="base">Meaning → base</option><option value="mixed" selected>Mixed</option></select>
  </div>
  <button class="btn btn-violet btn-full" style="justify-content:center" onclick="startHuman()">▶ Start game</button>
</div>

<!-- CPU SETUP -->
<div id="s-cpu" class="screen">
  <div class="top-bar"><button class="back-btn" onclick="show('s-home')">← Back</button><h2>vs Computer</h2></div>
  <div class="card">
    <label class="lbl">Your name</label><input class="sel-light" type="text" id="cpn" value="Student">
    <label class="lbl">Difficulty</label>
    <select class="sel-light" id="diff"><option value="easy">Easy — 50%</option><option value="med" selected>Medium — 70%</option><option value="hard">Hard — 90%</option></select>
    <label class="lbl">Rounds</label>
    <select class="sel-light" id="cp-rounds"><option value="5">5</option><option value="10" selected>10</option><option value="15">15</option></select>
  </div>
  <button class="btn btn-violet btn-full" style="justify-content:center" onclick="startCPU()">▶ Start game</button>
</div>

<!-- SENTENCE SETUP -->
<div id="s-sent-setup" class="screen">
  <div class="top-bar"><button class="back-btn" onclick="show('s-home')">← Back</button><h2>Sentence reading</h2></div>
  <div class="card">
    <label class="lbl">Sentence set</label>
    <select class="sel-light" id="sent-ss">
      <option value="2.4A">2.4 — Set A</option>
      <option value="2.4B">2.4 — Set B</option>
      <option value="2.5A">2.5 — Set A</option>
      <option value="2.5B">2.5 — Set B</option>
      <option value="2.5C">2.5 — Set C</option>
    </select>
    <label class="lbl">Mode</label>
    <select class="sel-light" id="sent-mode">
      <option value="read">Read aloud — teacher checks</option>
      <option value="type">Type the sentence</option>
    </select>
  </div>
  <button class="btn btn-mint btn-full" style="justify-content:center" onclick="startSentences()">▶ Start</button>
</div>

<!-- SENTENCE GAME -->
<div id="s-sent" class="screen">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
    <button class="back-btn" onclick="show('s-home')">✕</button>
    <div style="flex:1"><div class="prog-bg"><div class="prog-fill" id="sent-pb" style="width:0%"></div></div></div>
    <span style="font-size:13px;font-weight:700;color:rgba(255,255,255,.5)" id="sent-rl"></span>
  </div>
  <div class="sec" id="sent-setlabel" style="text-align:center"></div>
  <div style="font-size:12px;font-weight:700;color:rgba(255,255,255,.35);text-align:center;margin-bottom:4px" id="sent-num"></div>
  <div class="sent-card" id="sent-text"></div>
  <div id="sent-type-area" style="display:none;margin-top:4px">
    <input class="sent-input" type="text" id="sent-input" placeholder="Type the sentence here…" autocomplete="off">
    <button class="btn btn-violet" style="width:100%;justify-content:center" onclick="checkSentence()">Check ↵</button>
  </div>
  <div class="fb" id="sent-fb" style="display:none"></div>
  <div id="sent-read-btns" style="display:none;margin-top:12px">
    <div style="display:flex;gap:8px">
      <button class="btn btn-mint" style="flex:1;justify-content:center" onclick="sentResult(true)">✓ Correct</button>
      <button class="btn btn-coral" style="flex:1;justify-content:center" onclick="sentResult(false)">✗ Practice</button>
    </div>
  </div>
  <div id="sent-nxt" style="display:none;margin-top:12px">
    <button class="btn btn-violet" style="width:100%;justify-content:center" id="sent-nxt-btn" onclick="nextSentence()">Next sentence →</button>
  </div>
  <div class="score-line"><span class="score-badge" id="sent-sc"></span></div>
</div>

<!-- PASSAGE SETUP -->
<div id="s-pass-setup" class="screen">
  <div class="top-bar"><button class="back-btn" onclick="show('s-home')">← Back</button><h2>Passage reading</h2></div>
  <div class="card">
    <label class="lbl">Choose a passage</label>
    <select class="sel-light" id="pass-sel">
      <option value="0">At the Pond (2.4 AB)</option>
      <option value="1">Brad's Bad Day (2.4 B)</option>
      <option value="2">The Draft (2.4 B)</option>
      <option value="3">Big Bass (2.5 AB)</option>
      <option value="4">The Spring Job (2.5 B)</option>
      <option value="5">Help from Chan (2.5 B)</option>
    </select>
  </div>
  <button class="btn btn-violet btn-full" style="justify-content:center" onclick="startPassage()">▶ Read passage</button>
</div>

<!-- PASSAGE READ -->
<div id="s-pass-read" class="screen">
  <div class="top-bar"><button class="back-btn" onclick="show('s-home')">✕</button><h2 id="pass-title-h" style="font-size:17px"></h2></div>
  <div class="passage-box" id="pass-body"></div>
  <button class="btn btn-violet btn-full" style="justify-content:center;margin-top:12px" onclick="showComp()">Answer questions →</button>
</div>

<!-- PASSAGE COMP -->
<div id="s-pass-comp" class="screen">
  <div class="top-bar"><button class="back-btn" onclick="show('s-pass-read')">← Re-read</button><h2>Questions</h2></div>
  <div style="font-size:14px;font-weight:700;color:rgba(255,255,255,.5);margin-bottom:12px" id="comp-title"></div>
  <div id="comp-questions"></div>
  <div id="comp-submit-row"><button class="btn btn-violet btn-full" style="justify-content:center" onclick="submitComp()">Submit answers</button></div>
  <div id="comp-done" style="display:none">
    <div class="fb ok" id="comp-score-fb"></div>
    <div id="comp-review-area" style="margin-top:10px"></div>
    <button class="btn btn-violet btn-full" style="justify-content:center;margin-top:12px" onclick="show('s-home')">🏠 Home</button>
    <button class="btn btn-ghost btn-full" style="justify-content:center" onclick="show('s-pass-setup')">Try another passage</button>
  </div>
</div>

<!-- GAME -->
<div id="s-game" class="screen">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
    <button class="back-btn" onclick="quitGame()">✕</button>
    <div style="flex:1"><div class="prog-bg"><div class="prog-fill" id="g-pb" style="width:0%"></div></div></div>
    <span style="font-size:13px;font-weight:700;color:rgba(255,255,255,.5)" id="g-rl"></span>
  </div>
  <div id="g-vs" style="display:none"><div class="vs-card"><div id="g-vs-inner"></div></div></div>
  <div class="sec" style="text-align:center;margin:4px 0" id="g-turn"></div>
  <div class="sec" id="g-qt" style="margin-bottom:2px"></div>
  <div class="base-wrap"><div class="base-tile" id="g-tile">
    <div class="base-text" id="g-main"></div>
    <div class="base-sub" id="g-main-sub"></div>
  </div></div>
  <div id="g-choices"></div>

function doReset(){if(!confirm('Reset all progress?')) return;G.prog={};G.bestStreak=0;renderProg();refreshHome();}
function goMode(m){G.mode=m;if(m==='practice') startPractice();else if(m==='human') show('s-human');else if(m==='computer') show('s-cpu');else if(m==='sentences') show('s-sent-setup');else show('s-pass-setup');}

// ── CONFETTI ──────────────────────────────────────────────────────────────────
function fireConfetti(){
  var canvas=document.getElementById('confetti');
  var ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  var pieces=[];
  var colors=['#6c63ff','#f5c842','#4ecfb3','#ff6b6b','#fff'];
  for(var i=0;i<80;i++) pieces.push({x:Math.random()*canvas.width,y:-10,r:Math.random()*6+3,c:colors[Math.floor(Math.random()*colors.length)],vx:(Math.random()-.5)*4,vy:Math.random()*3+2,rot:Math.random()*360,vrot:(Math.random()-.5)*10});
  var t=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(function(p){
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.c;ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);
      ctx.restore();
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.vrot;p.vy+=.05;
    });
    t++;if(t<120) requestAnimationFrame(draw);else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

// ── LATIN BASE GAME ───────────────────────────────────────────────────────────
function buildQueue(n){
  var pool=getPool();
  var weak=pool.filter(function(b){return((G.prog[b.b]||{}).sk||0)<3;});
  var src=weak.length>0?weak:pool;
  var q=[];for(var i=0;i<n;i++) q.push(src[Math.floor(Math.random()*src.length)]);
  return q;
}
function startPractice(){G.queue=buildQueue(10);G.total=G.queue.length;G.round=0;G.score=[0,0];G.streak=0;G.missed=[];G.names=['Student',''];G.curPlayer=0;G.qtype='mixed';document.getElementById('g-vs').style.display='none';show('s-game');nextQ();}
function startHuman(){G.names=[document.getElementById('p1n').value||'P1',document.getElementById('p2n').value||'P2'];G.total=parseInt(document.getElementById('h-rounds').value)||10;G.qtype=document.getElementById('h-qtype').value;G.queue=buildQueue(G.total);G.round=0;G.score=[0,0];G.streak=0;G.missed=[];G.curPlayer=0;document.getElementById('g-vs').style.display='block';show('s-game');updateVS();nextQ();}
function startCPU(){G.names=[document.getElementById('cpn').value||'Student','Computer'];G.total=parseInt(document.getElementById('cp-rounds').value)||10;G.diff=document.getElementById('diff').value;G.qtype='mixed';G.queue=buildQueue(G.total);G.round=0;G.score=[0,0];G.streak=0;G.missed=[];G.curPlayer=0;document.getElementById('g-vs').style.display='block';show('s-game');updateVS();nextQ();}

function updateVS(){
  if(G.mode==='practice') return;
  var s0=G.score[0],s1=G.score[1];
  document.getElementById('g-vs-inner').innerHTML=
    '<div style="display:flex;align-items:center;gap:10px">'+
    '<div class="av" style="background:rgba(108,99,255,.25);color:#8b85ff">'+G.names[0][0].toUpperCase()+'</div>'+
    '<div style="flex:1"><div style="font-size:13px;font-weight:700;margin-bottom:3px">'+G.names[0]+' <span style="color:#6c63ff">'+s0+'</span></div>'+
    '<div class="hp-bg"><div class="hp-f" style="width:'+Math.min(100,s0*10)+'%;background:var(--violet)"></div></div></div>'+
    '<span style="font-size:12px;color:rgba(255,255,255,.3)">vs</span>'+
    '<div style="flex:1;text-align:right"><div style="font-size:13px;font-weight:700;margin-bottom:3px"><span style="color:var(--mint)">'+s1+'</span> '+G.names[1]+'</div>'+
    '<div class="hp-bg"><div class="hp-f" style="width:'+Math.min(100,s1*10)+'%;background:var(--mint);float:right"></div></div></div>'+
    '<div class="av" style="background:rgba(78,207,179,.2);color:var(--mint)">'+G.names[1][0].toUpperCase()+'</div></div>';
}

function nextQ(){
  if(G.round>=G.total){endGame();return;}
  G.answered=false;
  var q=G.queue[G.round];G.curQ=q;
  var pool=getPool();
  var qt=G.qtype;if(qt==='mixed') qt=Math.random()<.5?'meaning':'base';G.curQType=qt;
  document.getElementById('g-rl').textContent=(G.round+1)+'/'+G.total;
  document.getElementById('g-pb').style.width=(G.round/G.total*100)+'%';
  if(G.mode==='human') document.getElementById('g-turn').textContent=G.names[G.curPlayer]+"'s turn";
  else if(G.mode==='computer') document.getElementById('g-turn').textContent=G.names[0]+"'s turn";
  else document.getElementById('g-turn').textContent='';
  var wrongs=pool.filter(function(x){return x.b!==q.b;}).sort(function(){return Math.random()-.5;}).slice(0,3);
  var choices=[q].concat(wrongs).sort(function(){return Math.random()-.5;});
  // animate tile
  var tile=document.getElementById('g-tile');
  tile.style.animation='none';void tile.offsetWidth;tile.style.animation='tileIn .4s ease';
  if(qt==='meaning'){
    document.getElementById('g-qt').textContent='What does this base mean?';
    document.getElementById('g-main').textContent=q.b;
    document.getElementById('g-main-sub').textContent='identify the meaning';
    choices.forEach(function(c){c._lbl=c.m;});
  } else {
    document.getElementById('g-qt').textContent='Which base means this?';
    document.getElementById('g-main').textContent='"'+q.m+'"';
    document.getElementById('g-main-sub').textContent='find the base';
    choices.forEach(function(c){c._lbl=c.b;});
  }
  document.getElementById('g-fb').style.display='none';
  document.getElementById('g-ex').style.display='none';
  document.getElementById('g-nxt').style.display='none';
  var cd=document.getElementById('g-choices');cd.innerHTML='';
  choices.forEach(function(c){
    var b=document.createElement('button');b.className='choice-btn';b.textContent=c._lbl;
    b.onclick=function(){pick(c,b,choices,qt);};cd.appendChild(b);
  });
  updateSC();
}

function pick(chosen,btn,choices,qt){
  if(G.answered) return;G.answered=true;
  var q=G.curQ,ok=chosen.b===q.b;
  document.querySelectorAll('.choice-btn').forEach(function(b){
    b.disabled=true;
    var isOk=qt==='meaning'?b.textContent===q.m:b.textContent===q.b;
    if(isOk) b.classList.add('correct');
  });
  if(!ok) btn.classList.add('wrong');
  var fb=document.getElementById('g-fb');fb.style.display='block';
  var p=G.prog[q.b]||{c:0,i:0,sk:0};
  if(ok){
    fb.className='fb ok';fb.textContent='✓ Correct!';
    G.score[G.mode==='human'?G.curPlayer:0]++;G.streak++;
    if(G.streak>G.bestStreak) G.bestStreak=G.streak;
    p.c++;p.sk++;
    if(p.sk===3) setTimeout(fireConfetti,200);
  } else {
    fb.className='fb no';fb.textContent=q.b+' means "'+q.m+'"';
    G.streak=0;G.missed.push(q.b);p.i++;p.sk=0;
  }
  G.prog[q.b]=p;
  document.getElementById('g-ex-text').textContent=q.ex;
  document.getElementById('g-ex').style.display='block';
  if(G.mode==='computer'){var acc={easy:.5,med:.7,hard:.9}[G.diff]||.7;var cpOk=Math.random()<acc;G.score[1]+=cpOk?1:0;fb.textContent+=(cpOk?' · Computer: ✓':' · Computer: ✗');G.round++;updateVS();}
  else{G.round++;if(G.mode==='human'){G.curPlayer=1-G.curPlayer;updateVS();}}
  document.getElementById('g-nxt').style.display='block';
  document.getElementById('g-nxt-btn').textContent=G.mode==='human'?'Pass to '+G.names[G.curPlayer]:G.round>=G.total?'See results →':'Next →';
  updateSC();
}

function advance(){nextQ();}

function updateSC(){
  var sd=document.getElementById('g-sc');
  if(G.mode==='practice') sd.textContent='Score: '+G.score[0]+'/'+G.round;
  else sd.textContent=G.names[0]+': '+G.score[0]+'  ·  '+G.names[1]+': '+G.score[1];
  var ss=document.getElementById('g-str');
  if(G.streak>1) ss.innerHTML='<span class="streak">🔥 '+G.streak+' in a row</span>';
  else ss.innerHTML='';
}

function endGame(){
  document.getElementById('g-pb').style.width='100%';
  var s0=G.score[0],s1=G.score[1],n=G.total,emoji,title,sub;
  if(G.mode==='practice'){var pct=Math.round(s0/n*100);emoji=pct>=90?'⭐':pct>=70?'👍':'📚';title='Round complete!';sub=s0+' of '+n+' correct ('+pct+'%)';}
  else if(G.mode==='human'){emoji=s0>s1?'🏆':s1>s0?'🏆':'🤝';title=s0>s1?G.names[0]+' wins!':s1>s0?G.names[1]+' wins!':'Tie!';sub=G.names[0]+': '+s0+'  ·  '+G.names[1]+': '+s1;}
  else{emoji=s0>s1?'🏆':s1>s0?'🤖':'🤝';title=s0>s1?'You win!':s1>s0?'Computer wins!':'Tie!';sub='You: '+s0+'  ·  Computer: '+s1;}
  if(s0/n>=.9) setTimeout(fireConfetti,100);
  document.getElementById('d-emoji').textContent=emoji;
  document.getElementById('d-title').textContent=title;
  document.getElementById('d-sub').textContent=sub;
  var pool=getPool();
  var mastered=pool.filter(function(b){return((G.prog[b.b]||{}).sk||0)>=3;}).length;
  document.getElementById('d-stats').innerHTML=
    '<div class="stat"><div class="stat-n">'+s0+'</div><div class="stat-l">'+G.names[0]+'</div></div>'+
    (G.mode!=='practice'?'<div class="stat"><div class="stat-n">'+s1+'</div><div class="stat-l">'+G.names[1]+'</div></div>':'')+
    '<div class="stat"><div class="stat-n">'+G.bestStreak+'</div><div class="stat-l">Streak</div></div>'+
    '<div class="stat"><div class="stat-n">'+mastered+'</div><div class="stat-l">Mastered</div></div>';
  var um=G.missed.filter(function(v,i,a){return a.indexOf(v)===i;});
  var rl=document.getElementById('d-rev-list');
  if(!um.length){rl.innerHTML='<p style="color:var(--mint);font-weight:700">No errors — excellent work! 🎉</p>';}
  else rl.innerHTML=um.map(function(b){var info=allBases().find(function(x){return x.b===b;});return '<div class="prog-row"><b style="color:var(--violet-lt);min-width:72px">'+b+'</b><span style="flex:1;font-size:13px;color:rgba(255,255,255,.5)">'+( info?info.m:'')+'</span></div>';}).join('');
  show('s-done');
}

function again(){if(G.mode==='practice') startPractice();else if(G.mode==='human') startHuman();else startCPU();}
function quitGame(){if(confirm('Quit game?')) show('s-home');}

// ── SENTENCES ─────────────────────────────────────────────────────────────────
function startSentences(){
  var key=document.getElementById('sent-ss').value;
  G.sentList=(SENTENCES[key]||[]).slice();G.sentMode=document.getElementById('sent-mode').value;
  G.sentIdx=0;G.sentScore=[0,0];
  document.getElementById('sent-setlabel').textContent='Substep '+key;
  show('s-sent');renderSentence();
}
function renderSentence(){
  var list=G.sentList,idx=G.sentIdx,n=list.length;
  if(idx>=n){endSentences();return;}
  document.getElementById('sent-rl').textContent=(idx+1)+'/'+n;
  document.getElementById('sent-pb').style.width=(idx/n*100)+'%';
  document.getElementById('sent-num').textContent='Sentence '+(idx+1)+' of '+n;
  document.getElementById('sent-text').textContent=list[idx];
  document.getElementById('sent-fb').style.display='none';
  document.getElementById('sent-nxt').style.display='none';
  document.getElementById('sent-sc').textContent='✓ '+G.sentScore[0]+'  ✗ '+G.sentScore[1];
  if(G.sentMode==='read'){
    document.getElementById('sent-type-area').style.display='none';
    document.getElementById('sent-read-btns').style.display='block';
  } else {
    document.getElementById('sent-type-area').style.display='block';
    document.getElementById('sent-read-btns').style.display='none';
    document.getElementById('sent-input').value='';
    setTimeout(function(){document.getElementById('sent-input').focus();},100);
  }
}
function sentResult(ok){
  G.sentScore[ok?0:1]++;
  var fb=document.getElementById('sent-fb');fb.style.display='block';fb.className=ok?'fb ok':'fb no';
  fb.textContent=ok?'✓ Great reading!':'Keep practicing this one.';
  document.getElementById('sent-read-btns').style.display='none';
  G.sentIdx++;
  var nxt=document.getElementById('sent-nxt');nxt.style.display='block';
  var nb=document.getElementById('sent-nxt-btn');
  if(G.sentIdx>=G.sentList.length){nb.textContent='See results →';nb.onclick=endSentences;}
  else{nb.textContent='Next sentence →';nb.onclick=nextSentence;}
  document.getElementById('sent-sc').textContent='✓ '+G.sentScore[0]+'  ✗ '+G.sentScore[1];
}
function checkSentence(){
  var typed=document.getElementById('sent-input').value.trim().toLowerCase().replace(/[^a-z0-9 ]/g,'');
  var correct=G.sentList[G.sentIdx].toLowerCase().replace(/[^a-z0-9 ]/g,'');
  var ok=typed===correct;
  G.sentScore[ok?0:1]++;
  var fb=document.getElementById('sent-fb');fb.style.display='block';fb.className=ok?'fb ok':'fb no';
  if(ok) fb.textContent='✓ Perfect spelling!';
  else fb.textContent='Correct: '+G.sentList[G.sentIdx];
  document.getElementById('sent-type-area').style.display='none';
  G.sentIdx++;
  var nxt=document.getElementById('sent-nxt');nxt.style.display='block';
  var nb=document.getElementById('sent-nxt-btn');
  if(G.sentIdx>=G.sentList.length){nb.textContent='See results →';nb.onclick=endSentences;}
  else{nb.textContent='Next sentence →';nb.onclick=nextSentence;}
  document.getElementById('sent-sc').textContent='✓ '+G.sentScore[0]+'  ✗ '+G.sentScore[1];
}
function nextSentence(){renderSentence();}
function endSentences(){
  var ok=G.sentScore[0],tot=G.sentList.length,pct=Math.round(ok/tot*100);
  if(pct>=90) setTimeout(fireConfetti,100);
  document.getElementById('d-emoji').textContent=pct>=90?'⭐':pct>=70?'👍':'📚';
  document.getElementById('d-title').textContent='Sentences complete!';
  document.getElementById('d-sub').textContent=ok+' of '+tot+' correct ('+pct+'%)';
  document.getElementById('d-stats').innerHTML='<div class="stat"><div class="stat-n">'+ok+'</div><div class="stat-l">Correct</div></div><div class="stat"><div class="stat-n">'+G.sentScore[1]+'</div><div class="stat-l">Review</div></div><div class="stat"><div class="stat-n">'+pct+'%</div><div class="stat-l">Accuracy</div></div>';
  document.getElementById('d-rev-list').innerHTML=pct>=90?'<p style="color:var(--mint);font-weight:700">All sentences read well! 🎉</p>':'<p style="color:rgba(255,255,255,.5);font-size:14px">Practice the sentences marked ✗ with your teacher.</p>';
  document.getElementById('d-review').style.display='block';
  show('s-done');
  document.querySelector('#s-done .btn-violet').onclick=function(){show('s-sent-setup');};
}

// ── PASSAGES ──────────────────────────────────────────────────────────────────
function startPassage(){
  var idx=parseInt(document.getElementById('pass-sel').value)||0;
  G.curPassage=PASSAGES[idx];
  document.getElementById('pass-title-h').textContent=G.curPassage.title;
  document.getElementById('pass-body').innerHTML=
    '<div class="passage-title">'+G.curPassage.title+'</div>'+
    '<div class="pass-sub">Substep '+G.curPassage.substep+'</div>'+
    G.curPassage.text.split('\n\n').map(function(p){return '<p style="margin-bottom:14px">'+p+'</p>';}).join('');
  show('s-pass-read');
}
function showComp(){
  var p=G.curPassage;
  document.getElementById('comp-title').textContent=p.title+' — '+p.questions.length+' questions';
  document.getElementById('comp-submit-row').style.display='block';
  document.getElementById('comp-done').style.display='none';
  var html=p.questions.map(function(q,i){
    return '<div class="comp-card">'+
      '<div class="comp-q">'+(i+1)+'. '+q.q+'</div>'+
      q.opts.map(function(opt,j){
        return '<div class="comp-opt" id="opt-'+i+'-'+j+'" onclick="selOpt('+i+','+j+','+q.opts.length+')">'+
          '<span style="width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.2);flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:800" id="radio-'+i+'-'+j+'"></span>'+
          opt+'</div>';
      }).join('')+'</div>';
  }).join('');
  document.getElementById('comp-questions').innerHTML=html;
  show('s-pass-comp');
}
var compSel={};
function selOpt(qi,oi,n){
  for(var j=0;j<n;j++){
    var el=document.getElementById('opt-'+qi+'-'+j);
    var r=document.getElementById('radio-'+qi+'-'+j);
    if(el){el.classList.remove('selected');r.textContent='';}
  }
  var el2=document.getElementById('opt-'+qi+'-'+oi);
  var r2=document.getElementById('radio-'+qi+'-'+oi);
  if(el2){el2.classList.add('selected');r2.textContent='✓';}
  compSel[qi]=oi;
}
function submitComp(){
  var qs=G.curPassage.questions,correct=0,reviewHtml='';
  qs.forEach(function(q,i){
    var chosen=compSel[i]!=null?compSel[i]:-1;
    var ok=chosen===q.ans;
    if(ok) correct++;
    // reveal all
    q.opts.forEach(function(opt,j){
      var el=document.getElementById('opt-'+i+'-'+j);
      if(!el) return;
      el.onclick=null;
      if(j===q.ans) el.className='comp-opt reveal-ok';
      else if(j===chosen&&!ok) el.className='comp-opt reveal-no';
    });
    if(!ok) reviewHtml+='<div class="prog-row"><span style="color:var(--coral);font-weight:700;margin-right:8px">Q'+(i+1)+'</span><span style="font-size:13px;color:rgba(255,255,255,.6)">'+q.q+'<br><span style="color:var(--mint)">✓ '+q.opts[q.ans]+'</span></span></div>';
  });
  var pct=Math.round(correct/qs.length*100);
  if(pct>=80) setTimeout(fireConfetti,200);
  var fb=document.getElementById('comp-score-fb');
  fb.className=pct>=70?'fb ok':'fb no';
  fb.textContent=correct+' of '+qs.length+' correct ('+pct+'%)';
  document.getElementById('comp-submit-row').style.display='none';
  document.getElementById('comp-done').style.display='block';
  var ra=document.getElementById('comp-review-area');
  if(reviewHtml){ra.innerHTML='<div class="sec" style="margin-bottom:8px">Review</div>'+reviewHtml;}
  compSel={};
}

// ── PROGRESS ──────────────────────────────────────────────────────────────────
function renderProg(){
  var all=allBases(),tot=0,cor=0;
  all.forEach(function(b){var p=G.prog[b.b]||{};tot+=(p.c||0)+(p.i||0);cor+=(p.c||0);});
  document.getElementById('pt').textContent=tot;
  document.getElementById('pc').textContent=cor;
  document.getElementById('pp').textContent=tot>0?Math.round(cor/tot*100)+'%':'—';
  document.getElementById('ps').textContent=G.bestStreak;
  var html='';
  ['2.4','2.5'].forEach(function(ss){
    html+='<div style="font-size:10px;font-weight:800;color:rgba(255,255,255,.35);letter-spacing:1px;text-transform:uppercase;margin:14px 0 6px">Substep '+ss+'</div>';
    BASES[ss].forEach(function(b){
      var p=G.prog[b.b]||{c:0,i:0,sk:0},t=(p.c||0)+(p.i||0),mastered=(p.sk||0)>=3;
      var badge=mastered?'<span class="pill-master">mastered</span>':t>0?'<span class="pill-try">'+(p.c||0)+'/'+t+'</span>':'<span class="pill-try">—</span>';
      html+='<div class="prog-row"><span style="font-weight:800;color:var(--violet-lt);min-width:70px;font-size:13px">'+b.b+'</span><span style="flex:1;font-size:12px;color:rgba(255,255,255,.4)">'+b.m+'</span>'+badge+'</div>';
    });
  });
  document.getElementById('prog-list').innerHTML=html;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
setSS('2.4');
</script>
