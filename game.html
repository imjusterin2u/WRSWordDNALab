<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word DNA Lab</title>
<style>
body{font-family:sans-serif;background:#061412;color:#00e5a0;padding:20px}
.btn{background:#00e5a0;color:#061412;border:none;padding:12px 24px;border-radius:8px;font-size:16px;cursor:pointer;font-weight:700;margin:8px 0;width:100%}
.card{background:#0a1e1a;border:1px solid rgba(0,229,160,.2);border-radius:12px;padding:16px;margin-bottom:12px}
</style>
</head>
<body>

<h2 style="margin-bottom:16px">🔬 Word DNA Lab</h2>
<div id="status" class="card">Loading...</div>
<div id="content"></div>

<script>
// No modules, no imports — plain vanilla JS
(function(){
  var status = document.getElementById('status');
  var content = document.getElementById('content');

  // Read sessionStorage
  var studentRaw = sessionStorage.getItem('wdl_student');
  var mode = sessionStorage.getItem('wdl_mode') || 'solo';

  if(!studentRaw){
    status.innerHTML = '⚠️ No student selected. <a href="index.html" style="color:#00bcd4">← Go back</a>';
    return;
  }

  var student;
  try { student = JSON.parse(studentRaw); }
  catch(e){ status.innerHTML = 'Error reading student data: ' + e.message; return; }

  status.innerHTML = '✓ Student loaded: <b>' + student.name + '</b> · Mode: ' + mode;

  content.innerHTML = '<div class="card">' +
    '<div style="margin-bottom:12px;font-size:14px;opacity:.7">Zone ' + (student.currentZone||1) + ' of 7</div>' +
    '<h3 style="margin-bottom:16px">🔓 Lab Unlock</h3>' +
    '<p style="margin-bottom:16px;font-size:14px;opacity:.7">Zone map loading — tap a zone to begin</p>' +
    '<button class="btn" onclick="startZone(1)">▶ Start Zone 1 — Lab Unlock</button>' +
    '<button class="btn" style="background:transparent;border:1px solid rgba(0,229,160,.3);color:#00e5a0;margin-top:4px" onclick="window.location.href=\'index.html\'">← Back</button>' +
    '</div>';

  window.startZone = function(n){
    content.innerHTML = '<div class="card"><h3>Zone ' + n + ' started!</h3><p style="margin-top:8px;font-size:14px;opacity:.7">Game engine loading...</p></div>';
  };
})();
</script>
</body>
</html>
