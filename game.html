<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Word DNA Lab — Mission</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0d1021;--navy2:#161929;--navy3:#1e2240;--navy4:#252b50;
  --violet:#6c63ff;--violet-lt:#8b85ff;--violet-dk:#4d45cc;
  --teal:#4ecfb3;--teal-dk:#32a88f;--teal-lt:rgba(78,207,179,.15);
  --gold:#f5c842;--gold-lt:rgba(245,200,66,.15);
  --coral:#ff6b6b;--coral-lt:rgba(255,107,107,.15);
  --text:#e8eaf6;--sub:rgba(232,234,246,.45);--border:rgba(255,255,255,.08);
  --r:14px;--rs:10px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Nunito',sans-serif;background:var(--navy);color:var(--text);display:flex;flex-direction:column}

/* ── STARS ── */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) infinite alternate}
@keyframes twinkle{from{opacity:.1}to{opacity:.7}}

/* ── LAYOUT ── */
#app{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── TOP BAR ── */
.top-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:rgba(13,16,33,.85);border-bottom:1px solid var(--border);flex-shrink:0}
.top-bar .zone-label{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--teal);text-transform:uppercase}
.top-bar .zone-name{font-size:15px;font-weight:800;flex:1}
.top-bar .student-name{font-size:12px;color:var(--sub);font-weight:700}
.progress-wrap{padding:0 16px 8px;background:rgba(13,16,33,.85);flex-shrink:0}
.prog-bg{background:rgba(255,255,255,.08);border-radius:20px;height:5px}
.prog-fill{height:5px;border-radius:20px;background:linear-gradient(90deg,var(--violet),var(--teal));transition:width .4s}

/* ── SCROLL AREA ── */
.scroll{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}

/* ── ZONE MAP ── */
.zone-map{display:flex;flex-direction:column;gap:10px}
.zone-card{
  display:flex;align-items:center;gap:14px;
  background:var(--navy2);border:1px solid var(--border);border-radius:var(--r);
  padding:16px 18px;cursor:pointer;transition:all .2s;
}
.zone-card:hover{border-color:var(--violet);background:var(--navy3)}
.zone-card.active{border-color:var(--violet);box-shadow:0 0 20px rgba(108,99,255,.25)}
.zone-card.locked{opacity:.4;cursor:not-allowed}
.zone-card.done{border-color:rgba(78,207,179,.3)}
.zone-icon{font-size:28px;flex-shrink:0}
.zone-info{flex:1}
.zone-num{font-size:10px;font-weight:800;letter-spacing:1px;color:var(--sub);text-transform:uppercase}
.zone-title{font-size:16px;font-weight:800;margin:2px 0}
.zone-desc{font-size:12px;color:var(--sub)}
.zone-stars{font-size:16px;letter-spacing:2px}

/* ── STORY PANEL ── */
.story-panel{
  background:var(--navy2);border:1px solid rgba(108,99,255,.3);border-radius:var(--r);
  padding:20px;margin-bottom:16px;text-align:center;
  box-shadow:0 0 30px rgba(108,99,255,.1);
}
.story-icon{font-size:48px;margin-bottom:10px}
.story-title{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;color:var(--teal);margin-bottom:8px;letter-spacing:1px}
.story-text{font-size:15px;line-height:1.65;color:var(--sub)}
.story-text b{color:var(--text)}

/* ── QUESTION AREA ── */
.q-area{display:flex;flex-direction:column;gap:12px}

/* tile display */
.tile-display{
  display:flex;flex-wrap:wrap;gap:6px;justify-content:center;
  padding:20px;background:linear-gradient(135deg,var(--navy3),var(--navy4));
  border-radius:var(--r);border:1px solid var(--border);
  min-height:90px;align-items:center;
  animation:tileIn .4s ease;
}
@keyframes tileIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.tile{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:44px;height:48px;padding:0 10px;
  border-radius:8px;font-size:20px;font-weight:900;
  border:2px solid transparent;cursor:default;
  transition:all .2s;user-select:none;
}
.tile-consonant{background:#f4b8b8;color:#2c0a0a;border-color:#e8a0a0}
.tile-vowel{background:#f5e88a;color:#2c2000;border-color:#e5d060}
.tile-weld{background:#b8d9b0;color:#0a2c08;border-color:#90c488}
.tile-base{background:linear-gradient(135deg,var(--violet),var(--violet-dk));color:#fff;border-color:var(--violet-lt);font-size:16px;min-width:60px;letter-spacing:1px}
.tile-selected{box-shadow:0 0 0 3px var(--gold);transform:scale(1.1)}
.tile-correct{box-shadow:0 0 0 3px var(--teal);background:rgba(78,207,179,.3)!important}
.tile-wrong{box-shadow:0 0 0 3px var(--coral);animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* swipe word */
.swipe-word{
  display:flex;gap:4px;justify-content:center;flex-wrap:wrap;
  padding:24px 16px;background:linear-gradient(135deg,var(--navy3),var(--navy4));
  border-radius:var(--r);border:1px solid var(--border);
  user-select:none;-webkit-user-select:none;
}
.swipe-letter{
  width:52px;height:60px;display:flex;align-items:center;justify-content:center;
  border-radius:10px;font-size:26px;font-weight:900;
  background:var(--navy2);border:2px solid var(--border);
  transition:all .15s;
}
.swipe-letter.swept{background:var(--gold-lt);border-color:var(--gold);color:var(--gold)}
.swipe-letter.locked{background:var(--teal-lt);border-color:var(--teal);color:var(--teal)}

/* scooping */
.scoop-sentence{
  padding:20px 16px;background:var(--navy2);border-radius:var(--r);
  border:1px solid var(--border);font-size:18px;font-weight:700;
  line-height:2;position:relative;
}
.scoop-canvas{position:absolute;inset:0;border-radius:var(--r);pointer-events:none}
.scoop-words{display:flex;flex-wrap:wrap;gap:4px 10px;cursor:crosshair}
.scoop-word{padding:4px 2px;border-radius:4px;position:relative;transition:background .2s}
.scoop-word.scooped{color:var(--gold)}

/* choice buttons */
.choices{display:flex;flex-direction:column;gap:8px}
.choice{
  padding:14px 18px;border-radius:var(--r);
  background:var(--navy3);border:2px solid var(--border);
  font-size:16px;font-weight:700;color:var(--text);
  cursor:pointer;transition:all .15s;text-align:left;
  font-family:'Nunito',sans-serif;
}
.choice:hover{border-color:var(--violet);background:var(--navy4);transform:translateX(4px)}
.choice:active{transform:scale(.98)}
.choice.correct{background:var(--teal-lt);border-color:var(--teal);color:var(--teal)}
.choice.wrong{background:var(--coral-lt);border-color:var(--coral);color:var(--coral)}
.choice:disabled{cursor:default}

/* score line */
.score-line{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.score-badge{font-size:14px;font-weight:800;color:rgba(255,255,255,.6)}
.streak{display:inline-flex;align-items:center;gap:4px;background:var(--gold-lt);border:1px solid rgba(245,200,66,.3);border-radius:20px;padding:4px 12px;font-size:13px;font-weight:800;color:var(--gold)}

/* ── BUTTONS ── */
.btn{font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;border:none;border-radius:var(--rs);padding:10px 18px;font-size:14px;transition:transform .15s,box-shadow .15s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:scale(.97)}
.btn-violet{background:var(--violet);color:#fff;box-shadow:0 4px 14px rgba(108,99,255,.4)}
.btn-violet:hover{box-shadow:0 6px 20px rgba(108,99,255,.6)}
.btn-teal{background:var(--teal);color:#0d1021;box-shadow:0 4px 14px rgba(78,207,179,.3)}
.btn-ghost{background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--border)}
.btn-full{width:100%;padding:15px;}
.btn-launch{background:linear-gradient(135deg,var(--violet),var(--teal));color:#fff;border-radius:var(--r);box-shadow:0 6px 24px rgba(108,99,255,.4);width:100%;padding:16px;font-size:17px;margin-top:8px}

/* ── ERROR POPUP ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.popup{background:var(--navy2);border:1px solid rgba(255,107,107,.3);border-radius:var(--r);padding:24px;max-width:440px;width:100%;animation:popIn .3s ease}
@keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.popup-icon{font-size:40px;text-align:center;margin-bottom:10px}
.popup-title{font-size:17px;font-weight:900;color:var(--coral);text-align:center;margin-bottom:8px}
.popup-rule{font-size:15px;line-height:1.6;color:var(--text);text-align:center;margin-bottom:16px}
.popup-rule b{color:var(--gold)}
.popup-correct{background:var(--teal-lt);border:1px solid rgba(78,207,179,.3);border-radius:var(--rs);padding:12px;text-align:center;font-size:16px;font-weight:800;color:var(--teal);margin-bottom:16px}

/* ── RESULTS ── */
.results{text-align:center;padding:20px 0}
.result-emoji{font-size:64px;margin-bottom:12px;animation:bounce .6s ease}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.result-title{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;margin-bottom:6px}
.result-sub{font-size:14px;color:var(--sub);margin-bottom:20px}
.stars-display{font-size:44px;letter-spacing:8px;margin-bottom:20px}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.rstat{background:var(--navy3);border-radius:var(--rs);padding:14px;text-align:center}
.rstat-n{font-size:26px;font-weight:900;color:var(--gold)}
.rstat-l{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.error-list{background:var(--navy3);border-radius:var(--rs);padding:14px;text-align:left;margin-bottom:16px}
.error-item{padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;color:rgba(255,255,255,.6)}
.error-item:last-child{border-bottom:none}
.error-item b{color:var(--coral)}
.error-item span{color:var(--teal)}

/* ── CONFETTI ── */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:300}

/* ── ZONE COMPLETE BANNER ── */
.zone-complete{
  text-align:center;padding:24px;
  background:linear-gradient(135deg,rgba(108,99,255,.2),rgba(78,207,179,.15));
  border:1px solid rgba(108,99,255,.3);border-radius:var(--r);margin-bottom:16px;
}

/* ── SENTENCE READING ── */
.sentence-display{
  padding:24px 20px;background:linear-gradient(135deg,var(--navy3),var(--navy4));
  border-radius:var(--r);border:1px solid var(--border);
  font-size:20px;font-weight:700;line-height:1.6;text-align:center;
  position:relative;min-height:100px;display:flex;align-items:center;justify-content:center;
}
.teacher-btns{display:flex;gap:10px;margin-top:12px}
.teacher-btns .btn{flex:1;padding:16px;font-size:16px}

/* ── sec label ── */
.sec{font-size:10px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--sub);margin-bottom:8px}

/* ── card ── */
.card{background:var(--navy2);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:12px}
.card-title{font-size:16px;font-weight:800;margin-bottom:8px}
</style>
</head>
<body>
<canvas id="confetti"></canvas>
<div class="stars" id="stars"></div>

<div id="app">
  <div class="top-bar">
    <div>
      <div class="zone-label" id="tb-zone-label">Zone 1</div>
      <div class="zone-name" id="tb-zone-name">Lab Unlock</div>
    </div>
    <div class="student-name" id="tb-student"></div>
  </div>
  <div class="progress-wrap">
    <div class="prog-bg"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="scroll" id="scroll">
    <!-- content injected here -->
  </div>
</div>

<div class="overlay" id="error-popup" style="display:none">
  <div class="popup">
    <div class="popup-icon">🔍</div>
    <div class="popup-title" id="popup-title">Not quite!</div>
    <div class="popup-rule" id="popup-rule"></div>
    <div class="popup-correct" id="popup-correct"></div>
    <button class="btn btn-violet btn-full" onclick="dismissPopup()">Try again — I've got this! →</button>
  </div>
</div>

<script type="module">
import { getStudent, saveZoneProgress, saveScoop, updateCurrentZone } from './firebase.js';

// ── STARS ─────────────────────────────────────────────────────────────────────
const starsEl = document.getElementById('stars');
for(let i=0;i<60;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*2+.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;animation-delay:${(Math.random()*4).toFixed(1)}s`;
  starsEl.appendChild(s);
}

// ── SESSION ───────────────────────────────────────────────────────────────────
let STUDENT = JSON.parse(sessionStorage.getItem('wdl_student') || 'null');
if(!STUDENT){ window.location.href='index.html'; }
document.getElementById('tb-student').textContent = STUDENT.name;

// ── ZONE DATA ─────────────────────────────────────────────────────────────────
const ZONE_META = [
  {num:1,icon:'🔓',name:'Lab Unlock',    desc:'Welded sounds & closed syllable exceptions'},
  {num:2,icon:'🔬',name:'The Centrifuge', desc:'Two-letter blends'},
  {num:3,icon:'⚗️',name:'The Sequencer',  desc:'Three-letter blends'},
  {num:4,icon:'🧫',name:'Sample Storage', desc:'Latin bases'},
  {num:5,icon:'📋',name:'Evidence Board', desc:'Sentence reading & scooping'},
  {num:6,icon:'📖',name:'Archive Room',   desc:'Passage reading & comprehension'},
  {num:7,icon:'🏆',name:'The Vault',      desc:'Boss round — all skills'},
];

const STORIES = {
  1:{title:'SECURITY BREACH DETECTED',text:'Someone broke into the <b>Word DNA Lab</b> last night and scrambled everything! The welded sound samples are all mixed up. <b>Restore the Lab Unlock room</b> to begin repairs.'},
  2:{title:'CENTRIFUGE OFFLINE',text:'The blend centrifuge was sabotaged — two-letter blend samples are scattered everywhere. <b>Sort them back into the centrifuge</b> to restore power.'},
  3:{title:'SEQUENCER CORRUPTED',text:'The three-letter blend sequencer has been scrambled. The str-, scr-, spr-, and spl- samples are all mixed up. <b>Sweep to restore the sequence.</b>'},
  4:{title:'SAMPLES MISSING',text:'The Latin base samples — the DNA of words — were stolen from their storage vials. <b>Identify each base</b> to get them back where they belong.'},
  5:{title:'EVIDENCE SCATTERED',text:'The evidence board was destroyed. Sentences are jumbled. <b>Read each sentence</b> and scoop the phrases to rebuild the evidence.'},
  6:{title:'ARCHIVE IN CHAOS',text:'The archive room passages were shredded. <b>Read each passage</b> and answer the comprehension questions to reconstruct the files.'},
  7:{title:'THE VAULT — FINAL CHALLENGE',text:'All the samples are restored — but the intruder locked the vault. Only a <b>Lab Master</b> who knows ALL the skills can unlock it. This is your final test.'},
};

// ── GAME DATA ─────────────────────────────────────────────────────────────────
const WELD_QUESTIONS = [
  {word:'sing',   weld:'ing', consonants:['s'],        rule:'The welded sound -ing- keeps /s/ /ing/ together as one tap.', display:'sing'},
  {word:'blank',  weld:'ank', consonants:['bl'],       rule:'-ank- is a welded sound. The letters a-n-k stay glued together.', display:'blank'},
  {word:'trunk',  weld:'unk', consonants:['tr'],       rule:'-unk- is a welded sound. Think: skunk, trunk, chunk.', display:'trunk'},
  {word:'strong', weld:'ong', consonants:['str'],      rule:'-ong- is a welded sound. Think: song, long, strong.', display:'strong'},
  {word:'think',  weld:'ink', consonants:['th'],       rule:'-ink- is a welded sound. Think: pink, drink, rink.', display:'think'},
  {word:'clang',  weld:'ang', consonants:['cl'],       rule:'-ang- is a welded sound. Think: rang, bang, clang.', display:'clang'},
  {word:'blind',  weld:'ind', consonants:['bl'],       rule:'-ind- is a closed syllable exception. The i says its long sound.', display:'blind', exception:true},
  {word:'cold',   weld:'old', consonants:['c'],        rule:'-old- is a closed syllable exception. The o says its long sound.', display:'cold', exception:true},
  {word:'most',   weld:'ost', consonants:['m'],        rule:'-ost- is a closed syllable exception. Think: most, post, host.', display:'most', exception:true},
  {word:'child',  weld:'ild', consonants:['ch'],       rule:'-ild- is a closed syllable exception. The i says its long sound.', display:'child', exception:true},
];

const WELD_CHOICES = [
  ['ing','ang','unk','ink'],
  ['ank','ink','ong','ung'],
  ['unk','ink','ank','ang'],
  ['ong','ung','ang','ank'],
  ['ink','ing','ank','ong'],
  ['ang','ing','ong','unk'],
  ['ind','old','ost','ild'],
  ['old','ind','olt','ost'],
  ['ost','old','olt','ind'],
  ['ild','ind','old','olt'],
];

const BLEND2_QUESTIONS = [
  {word:'trunk',  blend:'tr', pos:[0,1], rule:'TR is a two-letter blend. Each letter makes its own sound: /t/ /r/.'},
  {word:'bring',  blend:'br', pos:[0,1], rule:'BR is a two-letter blend. /b/ /r/ — two separate sounds at the start.'},
  {word:'stand',  blend:'st', pos:[0,1], rule:'ST is a two-letter blend. /s/ /t/ — feel two separate taps.'},
  {word:'clump',  blend:'cl', pos:[0,1], rule:'CL is a two-letter blend. /k/ /l/ — two clear sounds together.'},
  {word:'draft',  blend:'dr', pos:[0,1], rule:'DR is a two-letter blend. /d/ /r/ — tap each one separately.'},
  {word:'crisp',  blend:'cr', pos:[0,1], rule:'CR is a two-letter blend. /k/ /r/ — both make sounds.'},
  {word:'blend',  blend:'bl', pos:[0,1], rule:'BL is a two-letter blend. /b/ /l/ — two sounds, not one.'},
  {word:'frost',  blend:'fr', pos:[0,1], rule:'FR is a two-letter blend. /f/ /r/ — think: from, frost, frog.'},
];

const BLEND3_QUESTIONS = [
  {word:'strap',   blend:'str', pos:[0,1,2], rule:'STR is a three-letter blend. Every letter makes its own sound: /s/ /t/ /r/.'},
  {word:'scrap',   blend:'scr', pos:[0,1,2], rule:'SCR is a three-letter blend. /s/ /k/ /r/ — three separate sounds.'},
  {word:'spring',  blend:'spr', pos:[0,1,2], rule:'SPR is a three-letter blend. /s/ /p/ /r/ — sweep all three!'},
  {word:'splash',  blend:'spl', pos:[0,1,2], rule:'SPL is a three-letter blend. /s/ /p/ /l/ — three sounds at the start.'},
  {word:'strong',  blend:'str', pos:[0,1,2], rule:'STR again — /s/ /t/ /r/. Think: strong, strap, struck.'},
  {word:'scrub',   blend:'scr', pos:[0,1,2], rule:'SCR — /s/ /k/ /r/. Think: scrub, scrap, scram.'},
  {word:'sprint',  blend:'spr', pos:[0,1,2], rule:'SPR — /s/ /p/ /r/. Think: sprint, spring, sprung.'},
  {word:'split',   blend:'spl', pos:[0,1,2], rule:'SPL — /s/ /p/ /l/. Think: split, splash, splat.'},
];

const BASES_DATA = [
  {b:'-fess-',m:'acknowledge',    ex:'confess, profess',         rule:'-fess- means ACKNOWLEDGE or ADMIT. Confess = to admit something.'},
  {b:'-gress-',m:'step / degree', ex:'progress, Congress',       rule:'-gress- means STEP or DEGREE. Progress = to step forward.'},
  {b:'-mand-',m:'order',          ex:'command, demand',          rule:'-mand- means ORDER. Command = to give an order.'},
  {b:'-mit-',m:'send',            ex:'submit, transmit',         rule:'-mit- means SEND. Submit = to send in. Transmit = to send across.'},
  {b:'-pel-',m:'drive / push',    ex:'expel, propel',            rule:'-pel- means DRIVE or PUSH. Expel = to push out.'},
  {b:'-pend-',m:'hang',           ex:'suspend, depend',          rule:'-pend- means HANG. Suspend = to hang up. Depend = to hang on.'},
  {b:'-press-',m:'press / push',  ex:'compress, express',        rule:'-press- means PRESS or PUSH AGAINST. Compress = to press together.'},
  {b:'-rupt-',m:'break',          ex:'disrupt, interrupt',       rule:'-rupt- means BREAK. Interrupt = to break into. Disrupt = to break apart.'},
  {b:'-sent-',m:'feel / perceive',ex:'consent, absent',          rule:'-sent- means FEEL or PERCEIVE. Consent = to feel in agreement.'},
  {b:'-sist-',m:'place / stand',  ex:'insist, resist',           rule:'-sist- means PLACE or STAND. Resist = to stand against.'},
  {b:'-stant-',m:'standing',      ex:'constant, instant',        rule:'-stant- means STANDING. Constant = always standing there.'},
  {b:'-tend-',m:'stretch / reach',ex:'extend, attend',           rule:'-tend- means STRETCH or REACH. Extend = to stretch out.'},
  {b:'-tent-',m:'stretch / reach',ex:'intent, extent',           rule:'-tent- means STRETCH or REACH. Intent = stretched toward a goal.'},
  {b:'-vent-',m:'come',           ex:'invent, prevent',          rule:'-vent- means COME. Invent = to come up with. Prevent = to come before.'},
  {b:'-dict-',m:'say / tell',     ex:'predict, dictate',         rule:'-dict- means SAY or TELL. Predict = to tell before it happens.'},
  {b:'-duct-',m:'lead',           ex:'conduct, product',         rule:'-duct- means LEAD. Conduct = to lead together.'},

function showZoneMap(){
  updateTopBar();
  document.getElementById('tb-zone-label').textContent = 'Operation Word DNA';
  document.getElementById('tb-zone-name').textContent = 'Mission Map';
  document.getElementById('prog-fill').style.width = ((G.zone-1)/7*100)+'%';

  </div>
  <div class="zone-map">`;

  ZONE_META.forEach(z=>{
    const zdata = G.zones[`zone${z.num}`];
    const stars = zdata?.stars || 0;
    const done = z.num < G.zone;
    const active = z.num === G.zone;
    const locked = z.num > G.zone;
    let cls = locked ? 'locked' : done ? 'done' : active ? 'active' : '';
    let starStr = done ? (stars===3?'⭐⭐⭐':stars===2?'⭐⭐':'⭐') : '';
    let rightContent = locked
      ? '<span style="font-size:20px;color:var(--sub)">🔒</span>'
      : done ? `<div class="zone-stars">${starStr}</div>` : '<span style="font-size:13px;font-weight:800;color:var(--violet)">PLAY →</span>';

    html += `<div class="zone-card ${cls}" onclick="${active||done?`startZone(${z.num})`:''}">

      <div class="zone-info">
        <div class="zone-num">Zone ${z.num}</div>
        <div class="zone-title">${z.name}</div>
        <div class="zone-desc">${z.desc}</div>

      ${rightContent}

  });

  html += `</div>`;
  render(html);
}

window.checkWeld = function(chosen, correct, rule, word){
  if(chosen === correct){
    markButtons(chosen, correct);
    G.score++; G.streak++; if(G.streak>G.bestStreak) G.bestStreak=G.streak;
    setTimeout(()=>{ G.q++; zone1Next(); }, 800);

    markButtons(chosen, correct);
    G.streak=0;
    const ruleText = `The welded sound in <b>${word}</b> is <b>-${correct}-</b>. ${rule}`;
    showError(ruleText, `-${correct}-`, ()=>{ G.q++; G.errors.push({q:word, wrong:chosen, correct}); zone1Next(); });

};

window.tapLetter = function(i, e){
  e.preventDefault();
  const el = document.getElementById(`sl-${i}`);
  if(!window._tapped) window._tapped = new Set();
  if(window._tapped.has(i)){ window._tapped.delete(i); el.classList.remove('swept'); }
  else { window._tapped.add(i); el.classList.add('swept'); }
  document.getElementById('blend-feedback').textContent = `Selected: ${[...window._tapped].sort().map(j=>document.querySelector(`#sl-${j}`).textContent).join('')}`;
};

window.submitBlend2 = function(correct, rule, word){
  const tapped = [...window._tapped].sort();
  const correctIdx = [0,1];
  const chosen = tapped.map(i=>document.querySelector(`#sl-${i}`).textContent).join('');
  if(JSON.stringify(tapped)===JSON.stringify(correctIdx) && chosen.toLowerCase()===correct){
    document.querySelectorAll('.swipe-letter').forEach((el,i)=>{ if(i<2) el.classList.add('locked'); });
    G.score++; G.streak++; if(G.streak>G.bestStreak) G.bestStreak=G.streak;
    document.getElementById('blend-feedback').textContent = `✓ ${correct.toUpperCase()} is the blend!`;
    setTimeout(()=>{ G.q++; zone2Next(); }, 900);
  } else {
    const ruleText = `The blend in <b>${word}</b> is <b>${correct.toUpperCase()}</b>. ${rule}`;
    G.streak=0;
    showError(ruleText, `${correct.toUpperCase()} — /`+correct.split('').join('/ /')+`/`, ()=>{ G.q++; G.errors.push({q:word,wrong:chosen,correct}); zone2Next(); });
  }
};

    ${scoreBar()}`);
  window._swept3 = new Set();
  setupSwipe3();

function setupSwipe3(){
  const container = document.getElementById('swipe-word');
  if(!container) return;
  let sweeping = false;
  const mark = (i)=>{
    if(!window._swept3.has(i)){
      window._swept3.add(i);
      const el=document.getElementById(`sl-${i}`);
      if(el) el.classList.add('swept');
      document.getElementById('blend-feedback').textContent = `Sweeping: ${[...window._swept3].sort((a,b)=>a-b).map(j=>document.querySelector(`#sl-${j}`).textContent).join('')}`;
    }
  };
  container.addEventListener('touchstart',(e)=>{ sweeping=true; e.preventDefault();
    const t=e.touches[0]; const el=document.elementFromPoint(t.clientX,t.clientY);
    if(el&&el.dataset.i!=null) mark(parseInt(el.dataset.i));
  },{passive:false});
  container.addEventListener('touchmove',(e)=>{ if(!sweeping) return; e.preventDefault();
    const t=e.touches[0]; const el=document.elementFromPoint(t.clientX,t.clientY);
    if(el&&el.dataset.i!=null) mark(parseInt(el.dataset.i));
  },{passive:false});
  container.addEventListener('touchend',()=>{ sweeping=false; });
  // click fallback
  container.querySelectorAll('.swipe-letter').forEach(el=>{
    el.addEventListener('click',()=>{ mark(parseInt(el.dataset.i)); });
  });
}

window.submitBlend3 = function(correct, rule, word){
  const swept = [...window._swept3].sort((a,b)=>a-b);
  const chosen = swept.map(i=>document.querySelector(`#sl-${i}`)?.textContent||'').join('');
  if(chosen.toLowerCase()===correct && swept[0]===0 && swept.length===3){
    [0,1,2].forEach(i=>{ const el=document.getElementById(`sl-${i}`); if(el) el.classList.add('locked'); });
    G.score++; G.streak++; if(G.streak>G.bestStreak) G.bestStreak=G.streak;
    document.getElementById('blend-feedback').textContent=`✓ ${correct.toUpperCase()} is the blend!`;
    setTimeout(()=>{ G.q++; zone3Next(); },900);
  } else {
    G.streak=0;
    const ruleText=`The blend in <b>${word}</b> is <b>${correct.toUpperCase()}</b>. ${rule}`;
    showError(ruleText,`${correct.toUpperCase()} — /`+correct.split('').join('/ /')+`/`,()=>{ G.q++; G.errors.push({q:word,wrong:chosen,correct}); zone3Next(); });
  }
};

    <div class="teacher-btns">
      <button class="btn btn-teal" onclick="sentCorrect(true)">✓ Read correctly</button>
      <button class="btn btn-ghost" onclick="sentCorrect(false)">✗ Needs practice</button>
    </div>
    ${scoreBar()}`);
  window._scooped = new Set();
}

window.scoop = function(i){
  if(window._scooped.has(i)){ window._scooped.delete(i); document.getElementById(`sw-${i}`).classList.remove('scooped'); }
  else { window._scooped.add(i); document.getElementById(`sw-${i}`).classList.add('scooped'); }
};

window.sentCorrect = async function(ok){
  if(ok){ G.score++; G.streak++; if(G.streak>G.bestStreak) G.bestStreak=G.streak; }
  else { G.streak=0; G.errors.push({q:SENTENCES_5[G.q%SENTENCES_5.length].text, wrong:'needs practice', correct:'correct read'}); }
  try { await saveScoop(STUDENT.id, 5, G.q, ok); } catch(e){}
  G.q++;
  zone5Next();
};

// ── ZONE 6 — PASSAGE + COMPREHENSION ─────────────────────────────────────────
function zone6Start(){
  G.passageIdx = G.substep==='2.5' ? 1 : 0;
  const p = PASSAGES[G.passageIdx];
  render(`
    <div class="sec" style="text-align:center">ARCHIVE ROOM — Read the passage</div>
    <div class="card">
      <div class="card-title">${p.title} <span style="font-size:11px;color:var(--sub);font-weight:600">(${p.substep})</span></div>
      <div style="font-size:15px;line-height:1.75;color:var(--sub)">
        ${p.text.split('\n\n').map(para=>`<p style="margin-bottom:12px;color:rgba(232,234,246,.7)">${para}</p>`).join('')}
      </div>
    </div>
    <button class="btn btn-launch" onclick="zone6Questions()">Answer questions →</button>`);
}

window.zone6Questions = function(){
  const p = PASSAGES[G.passageIdx];
  G.q = 0;
  zone6Next(p);
};

function zone6Next(p){
  if(G.q >= p.questions.length){ zoneComplete(); return; }
  const item = p.questions[G.q];
  render(`
    <div class="sec" style="text-align:center">COMPREHENSION — Question ${G.q+1} of ${p.questions.length}</div>
    <div class="card" style="font-size:15px;font-weight:700;margin-bottom:12px">${item.q}</div>
    <div class="choices">
      ${item.opts.map((o,i)=>`<button class="choice" onclick="checkPassage(${i},${item.ans},'${item.rule.replace(/'/g,"\\'")}','${item.opts[item.ans].replace(/'/g,"\\'")}')">${o}</button>`).join('')}
    </div>
    ${scoreBar()}`);
}

window.checkPassage = function(chosen, correct, rule, correctText){
  const p = PASSAGES[G.passageIdx];
  if(chosen===correct){
    markButtons(chosen, correct, true);
    G.score++; G.streak++; if(G.streak>G.bestStreak) G.bestStreak=G.streak;
    setTimeout(()=>{ G.q++; zone6Next(p); },800);
  } else {
    markButtons(chosen, correct, true);
    G.streak=0;
    showError(rule, correctText, ()=>{ G.q++; G.errors.push({q:'Passage Q'+(G.q+1), wrong:chosen, correct:correctText}); zone6Next(p); });
  }
};

// ── ZONE 7 — VAULT BOSS ───────────────────────────────────────────────────────
function zone7Next(){
  if(G.q >= G.total){ zoneComplete(); return; }
  const item = VAULT_QUESTIONS[G.q % VAULT_QUESTIONS.length];
  const typeLabel = item.type==='base'?'LATIN BASE':item.type==='blend'?'BLEND':'WELDED SOUND';
  render(`
    <div class="sec" style="text-align:center">THE VAULT — ${typeLabel} — ${G.q+1} of ${G.total}</div>
    <div class="tile-display">
      <div style="font-size:18px;font-weight:800;color:var(--text);text-align:center">${item.q}</div>
    </div>
    <div class="choices">
      ${item.opts.map((o,i)=>`<button class="choice" onclick="checkVault(${i},${item.ans},'${item.rule.replace(/'/g,"\\'")}','${item.opts[item.ans].replace(/'/g,"\\'")}')">${o}</button>`).join('')}
    </div>
    ${scoreBar()}`);
}

window.checkVault = function(chosen, correct, rule, correctText){
  if(chosen===correct){
    markButtons(chosen,correct,true);
    G.score++; G.streak++; if(G.streak>G.bestStreak) G.bestStreak=G.streak;
    setTimeout(()=>{ G.q++; zone7Next(); },800);
  } else {
    markButtons(chosen,correct,true);
    G.streak=0;
    showError(rule, correctText, ()=>{ G.q++; G.errors.push({q:VAULT_QUESTIONS[G.q%VAULT_QUESTIONS.length]?.q||'', wrong:chosen, correct:correctText}); zone7Next(); });
  }
};

// ── SHARED HELPERS ────────────────────────────────────────────────────────────
function scoreBar(){
  return `<div class="score-line">
    <span class="score-badge">Score: ${G.score}/${G.q}</span>
    ${G.streak>1?`<span class="streak">🔥 ${G.streak} in a row</span>`:''}
  </div>`;
}

function markButtons(chosen, correct, byIndex=false){
  document.querySelectorAll('.choice').forEach((b,i)=>{
    b.disabled=true;
    const match = byIndex ? i===correct : b.textContent.trim()===correct;
    const isMine = byIndex ? i===chosen : b.textContent.trim()===chosen;
    if(match) b.classList.add('correct');
    else if(isMine && !match) b.classList.add('wrong');
  });
}

// ── ERROR POPUP ───────────────────────────────────────────────────────────────
let _popupCallback = null;
function showError(ruleHtml, correctDisplay, callback){
  document.getElementById('popup-rule').innerHTML = ruleHtml;
  document.getElementById('popup-correct').textContent = '✓ ' + correctDisplay;
  document.getElementById('error-popup').style.display = 'flex';
  _popupCallback = callback;
}
window.dismissPopup = function(){
  document.getElementById('error-popup').style.display = 'none';
  if(_popupCallback){ _popupCallback(); _popupCallback=null; }
};

// ── ZONE COMPLETE ─────────────────────────────────────────────────────────────
async function zoneComplete(){
  const pct = Math.round(G.score/G.total*100);
  const stars = pct>=90 ? 3 : pct>=70 ? 2 : 1;
  const emoji = stars===3?'⭐':stars===2?'🌟':'✨';
  const starsStr = '⭐'.repeat(stars)+'☆'.repeat(3-stars);

  if(stars===3) fireConfetti();

  // save to firebase
  try {
    await saveZoneProgress(STUDENT.id, G.zone, stars, {
      correct: G.score, total: G.total,
      errors: G.errors, currentZone: G.zone+1
    });
    G.zones[`zone${G.zone}`] = { stars, lastScore:G.score, total:G.total };
    STUDENT.currentZone = Math.max(STUDENT.currentZone||1, G.zone+1);
    sessionStorage.setItem('wdl_student', JSON.stringify(STUDENT));
  } catch(e){ console.error('Save error',e); }

  const messages = {
    3:'Perfect score! The lab is one step closer to being restored! 🔬',
    2:'Great work! Zone secured with some minor repairs still needed.',
    1:'Zone cleared! A few bases still need reinforcement — you can replay anytime.'
  };

  let errorSection = '';
  if(G.errors.length){
    errorSection = `<div class="error-list">
      <div class="sec" style="margin-bottom:8px">Review these</div>
      ${G.errors.map(e=>`<div class="error-item"><b>${e.q}</b> → <span>${e.correct}</span></div>`).join('')}
    </div>`;
  }

  const isLast = G.zone===7;
  render(`
    <div class="results">
      <div class="result-emoji">${emoji}</div>
      <div class="result-title">Zone ${G.zone} Complete!</div>
      <div class="result-sub">${ZONE_META[G.zone-1].name}</div>
      <div class="stars-display">${starsStr}</div>
      <div class="result-grid">
        <div class="rstat"><div class="rstat-n">${G.score}/${G.total}</div><div class="rstat-l">Score</div></div>
        <div class="rstat"><div class="rstat-n">${pct}%</div><div class="rstat-l">Accuracy</div></div>
        <div class="rstat"><div class="rstat-n">${G.bestStreak}</div><div class="rstat-l">Best streak</div></div>
        <div class="rstat"><div class="rstat-n">${G.errors.length}</div><div class="rstat-l">Errors</div></div>
      </div>
      <div style="font-size:14px;color:var(--sub);margin-bottom:16px">${messages[stars]}</div>
      ${errorSection}
      ${isLast
        ? `<button class="btn btn-launch" onclick="showLabRestored()">🏆 Restore the Lab!</button>`
        : `<button class="btn btn-launch" onclick="startZone(${G.zone+1})">Next zone: ${ZONE_META[G.zone]?.icon} ${ZONE_META[G.zone]?.name} →</button>`
      }
      <button class="btn btn-ghost btn-full" style="margin-top:8px" onclick="showZoneMap()">← Mission map</button>
      ${stars<3?`<button class="btn btn-ghost btn-full" style="margin-top:4px" onclick="startZone(${G.zone})">↺ Replay this zone</button>`:''}
    </div>`);
}

// ── LAB RESTORED ─────────────────────────────────────────────────────────────
window.showLabRestored = function(){
  fireConfetti();
  setTimeout(fireConfetti, 800);
  render(`<div class="results">
    <div style="font-size:80px;margin-bottom:16px">🔬✨</div>
    <div class="result-title" style="font-size:24px;color:var(--gold)">LAB RESTORED!</div>
    <div style="font-size:15px;color:var(--sub);margin:12px 0 24px;line-height:1.6">
      Outstanding work, <b style="color:var(--text)">${STUDENT.name}</b>!<br>
      The Word DNA Lab is back in business.<br>
      Dr. Word is on her way back. 🧬
    </div>
    <div style="font-size:40px;margin-bottom:16px">🏆</div>
    <button class="btn btn-launch" onclick="showZoneMap()">Play again</button>
    <button class="btn btn-ghost btn-full" style="margin-top:8px" onclick="window.location.href='index.html'">← Back to student select</button>
  </div>`);
};

// ── CONFETTI ──────────────────────────────────────────────────────────────────
function fireConfetti(){
  const canvas=document.getElementById('confetti');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  const pieces=[];
  const colors=['#6c63ff','#f5c842','#4ecfb3','#ff6b6b','#fff','#8b85ff'];
  for(let i=0;i<90;i++) pieces.push({x:Math.random()*canvas.width,y:-10,r:Math.random()*7+3,c:colors[Math.floor(Math.random()*colors.length)],vx:(Math.random()-.5)*5,vy:Math.random()*4+2,rot:Math.random()*360,vr:(Math.random()-.5)*12});
  let t=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.c;ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);
      ctx.restore();
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.vy+=.06;
    });
    t++;if(t<140) requestAnimationFrame(draw);else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
showZoneMap();
</script>
